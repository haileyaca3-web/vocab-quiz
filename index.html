<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh;display:flex;justify-content:center;padding:1rem;}
.app{width:100%;max-width:420px;padding:1rem;}
.badge{font-size:16px;color:#888;margin-bottom:4px;}
.title{font-size:22px;font-weight:500;color:#111;margin-bottom:1rem;}
.app-header{text-align:center;padding:2rem 0 1rem;}
.app-title{font-size:38px;font-weight:900;color:#111;font-family:'Nunito',sans-serif;line-height:1.1;}
.app-sub{font-size:17px;color:#888;margin-top:2px;font-family:'Nunito',sans-serif;}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:1.25rem;margin-bottom:10px;}
.label{font-size:16px;color:#888;margin-bottom:6px;}
.qword{font-size:28px;font-weight:500;color:#111;}
.qword.sm{font-size:22px;}
.opts{display:flex;flex-direction:column;gap:8px;margin-top:1rem;}
.opt{background:#fff;border:1px solid #ddd;border-radius:8px;padding:14px 18px;font-size:18px;color:#111;cursor:pointer;text-align:left;transition:background 0.15s;}
.opt:hover:not(:disabled){background:#f5f5f5;}
.opt.ok{background:#EAF3DE;border-color:#639922;color:#3B6D11;}
.opt.selected{background:#E8F4FD;border-color:#185FA5;color:#185FA5;}
.opt.no{background:#FCEBEB;border-color:#A32D2D;color:#791F1F;}
input[type=text],input[type=password],select{width:100%;border:1px solid #ddd;border-radius:8px;padding:14px 16px;font-size:18px;color:#111;background:#fff;margin-top:8px;outline:none;appearance:none;}
input:focus,select:focus{border-color:#1D9E75;}
.btn{width:100%;margin-top:8px;background:#fff;border:1px solid #ddd;border-radius:8px;padding:15px;font-size:19px;font-weight:500;color:#111;cursor:pointer;transition:background 0.15s;}
.btn:hover{background:#f5f5f5;}
.btn.primary{background:#111;color:#fff;border-color:#111;}
.btn.primary:hover{background:#333;}
.btn.green{background:#1D9E75;color:#fff;border-color:#1D9E75;}
.btn.green:hover{background:#178a65;}
.btn.secondary{background:#fff;border:1px solid #ddd;color:#888;font-weight:400;}
.btn.division{flex:1;padding:22px;font-size:18px;font-weight:600;border-radius:12px;border:2px solid #ddd;background:#fff;cursor:pointer;}
.btn.division.mid{border-color:#185FA5;color:#185FA5;}
.btn.division.high{border-color:#1D9E75;color:#1D9E75;}
.sbtn{width:100%;margin-top:8px;background:#fff;border:1px solid #ddd;border-radius:8px;padding:14px;font-size:19px;color:#111;cursor:pointer;}
.sbtn:hover{background:#f5f5f5;}
.fb{font-size:18px;margin-top:8px;padding:10px 14px;border-radius:8px;}
.fb.ok{background:#EAF3DE;color:#3B6D11;}
.fb.no{background:#FCEBEB;color:#791F1F;}
.fb.warn{background:#FAEEDA;color:#633806;}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:1rem;}
.nbtn{background:#fff;border:1px solid #ddd;border-radius:8px;padding:12px 22px;font-size:18px;color:#111;cursor:pointer;}
.nbtn:hover:not(:disabled){background:#f5f5f5;}
.nbtn:disabled{opacity:0.3;cursor:default;}
.pbar{background:#eee;border-radius:999px;height:6px;margin:10px 0;overflow:hidden;}
.pfill{height:100%;background:#111;border-radius:999px;transition:width 0.3s;}
.tbar{background:#eee;border-radius:999px;height:8px;overflow:hidden;}
.tfill{height:100%;border-radius:999px;transition:width 1s linear;}
.ttext{font-size:16px;color:#888;margin-bottom:4px;}
.srow{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:10px;width:100%;text-align:left;cursor:pointer;}
.srow:hover{border-color:#ccc;background:#fafafa;}
.srow.req{border-color:#1D9E75;}
.stop{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;}
.sname{font-size:19px;font-weight:500;color:#111;}
.sdesc{font-size:17px;color:#888;}
.sbadge{font-size:15px;padding:3px 10px;border-radius:999px;}
.sbadge.r{background:#E1F5EE;color:#0F6E56;}
.sbadge.o{background:#f0f0f0;color:#888;}
.togwrap{display:flex;align-items:center;gap:8px;margin-top:10px;}
.tog{position:relative;width:36px;height:20px;display:inline-block;}
.tog input{opacity:0;width:0;height:0;}
.sl{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:999px;transition:0.2s;}
.sl:before{position:absolute;content:"";height:14px;width:14px;left:3px;bottom:3px;background:white;border-radius:50%;transition:0.2s;}
input:checked+.sl{background:#111;}
input:checked+.sl:before{transform:translateX(16px);}
.scramble{font-size:26px;font-weight:500;color:#185FA5;letter-spacing:4px;margin-top:8px;}
.res-big{font-size:50px;font-weight:500;color:#111;}
.sresrow{display:flex;justify-content:space-between;font-size:18px;padding:8px 0;border-bottom:1px solid #eee;}
.score-pill{font-size:16px;padding:4px 12px;border-radius:999px;}
.score-hi{background:#EAF3DE;color:#3B6D11;}
.score-mid{background:#FAEEDA;color:#633806;}
.score-lo{background:#FCEBEB;color:#791F1F;}
.retry-banner{background:#E1F5EE;border:1px solid #1D9E75;border-radius:10px;padding:12px 16px;margin-bottom:12px;text-align:center;}
.retry-banner p{font-size:18px;color:#0F6E56;}
.loading{text-align:center;padding:2rem;color:#888;font-size:18px;}
.divider{display:flex;align-items:center;gap:12px;margin:12px 0;color:#ccc;font-size:17px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#eee;}
.rank-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #eee;}
.rank-num{font-size:22px;width:32px;text-align:center;}
.rank-name{font-size:19px;font-weight:500;color:#111;}
.school-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.school-btn{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:18px;font-size:18px;font-weight:500;color:#111;cursor:pointer;text-align:center;}
.school-btn:hover{border-color:#1D9E75;background:#f0faf6;}
</style>
</head>
<body>
<div class="app"><div id="root"></div></div>
<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbxmAKVf0x4D3WfQAkepaWvnYODrpbtKpQxCjtBc8mpXz0sFe6Wzroed6PSmHGse4Tj03Q/exec';
const TEACHER_ID='haileyaca';
const TEACHER_PW='haileyaca1@';
const HIGH_SCHOOLS=['순천고1','순천여고1','강남여고1','금당고1','제일고1','복성고1','매여고2','매고2','순여고2','효천고2','금당고2'];
const QUOTES=[
  {q:"Just do it.",a:"Nike"},
  {q:"Stay hungry, stay foolish.",a:"Steve Jobs"},
  {q:"Fall seven times, stand up eight.",a:"Japanese Proverb"},
  {q:"Start where you are.",a:"Arthur Ashe"},
  {q:"Little by little, one travels far.",a:"Tolkien"},
  {q:"Do what you can, with what you have.",a:"Roosevelt"},
  {q:"Believe you can, you're halfway there.",a:"Roosevelt"},
  {q:"It always seems impossible until done.",a:"Mandela"},
  {q:"Be the change you wish to see.",a:"Gandhi"},
  {q:"Success is not final, failure not fatal.",a:"Churchill"},
  {q:"Act as if what you do makes a difference.",a:"William James"},
  {q:"You miss 100% of shots you don't take.",a:"Gretzky"},
  {q:"The secret of getting ahead is getting started.",a:"Twain"},
  {q:"Do one thing every day that scares you.",a:"Eleanor Roosevelt"},
  {q:"In the middle of difficulty lies opportunity.",a:"Einstein"},
  {q:"It does not matter how slowly you go.",a:"Confucius"},
  {q:"The future belongs to those who believe.",a:"Eleanor Roosevelt"},
  {q:"Genius is 1% inspiration, 99% perspiration.",a:"Edison"},
  {q:"Dream big, start small, act now.",a:"Robin Sharma"},
  {q:"You are braver than you believe.",a:"A.A. Milne"},
  {q:"Strive for progress, not perfection.",a:"Unknown"},
  {q:"Hardships often prepare ordinary people.",a:"C.S. Lewis"},
  {q:"The harder I work, the luckier I get.",a:"Goldwyn"},
  {q:"Education is the most powerful weapon.",a:"Mandela"},
];

const STAGE_DEFS=[
  {id:1,name:'Stage 1',desc:'영어 → 한국어 객관식',req:true,mc:true},
  {id:2,name:'Stage 2',desc:'한국어 → 영어 객관식',req:true,mc:true},
  {id:3,name:'Stage 3',desc:'한국어 → 영어 타이핑',req:false,mc:false},
  {id:4,name:'Stage 4',desc:'Unscramble 타이핑',req:false,mc:false},
];

function scramble(w){const a=w.toUpperCase().split('');for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a.join('')===w.toUpperCase()?scramble(w):a.join('');}
function shuffle(a){return[...a].sort(()=>Math.random()-0.5);}
function getWrong(words,cur,field){return shuffle(words.filter(w=>w[field]!==cur[field])).slice(0,3).map(w=>w[field]);}
function normalizeAnswer(str){return str.replace(/\(.*?\)/g,'').replace(/\s+/g,' ').trim().toLowerCase();}
function checkAnswer(val,correct){
  const v=normalizeAnswer(val);
  const correctNorm=normalizeAnswer(correct);
  if(v===correctNorm)return true;
  if(v===correct.trim().toLowerCase())return true;
  return false;
}

let S={
  screen:'login',loginTab:'login',quoteIdx:Math.floor(Math.random()*24),_selectedOpt:undefined,
  name:'',userId:'',division:'',school:'',
  books:[],selectedBook:null,
  units:[],allWords:[],selectedUnit:null,
  opt3:false,opt4:false,
  stages:[],stageIdx:0,qIdx:0,
  answers:{},feedback:{},scrambles:{},optionsCache:{},
  stageScores:{},stageWrongs:{},wrongWordObjs:[],_ts:false,
  currentWords:[],timer:null,timeLeft:0,maxTime:0,
  rankings:[],retryWords:[],isRetry:false,
  loginError:'',loading:false,
  teacherResults:[],pendingStudents:[],teacherSelected:null,
  myResults:[],calendarDate:null,
};

function startTimer(sec){
  clearInterval(S.timer);S.timeLeft=sec;S.maxTime=sec;updateTimerUI();
  S.timer=setInterval(function(){
    S.timeLeft--;updateTimerUI();
    if(S.timeLeft<=0){
      clearInterval(S.timer);
      const words=S.isRetry?S.retryWords:S.currentWords;
      const w=words[S.qIdx];
      if(!S.feedback[S.qIdx]){
        const sid=S.stages[S.stageIdx];
        S.answers[S.qIdx]='';S.feedback[S.qIdx]='wrong';
        if(!S.stageWrongs[sid])S.stageWrongs[sid]=[];
        S.stageWrongs[sid].push(w.en);
        if(!S.wrongWordObjs.find(x=>x.en===w.en))S.wrongWordObjs.push(w);
        S._ts=false;render();
      }
    }
  },1000);
}
function updateTimerUI(){
  const el=document.getElementById('tfill'),tt=document.getElementById('ttime');
  if(el){const p=S.timeLeft/S.maxTime;el.style.width=Math.round(p*100)+'%';el.style.background=p>0.5?'#1D9E75':p>0.25?'#BA7517':'#E24B4A';}
  if(tt)tt.textContent=S.timeLeft+'초';
}
function saveResult(){
  fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',body:JSON.stringify({
    action:'saveResult',name:S.name,id:S.userId,division:S.division,unit:S.selectedUnit,
    s1score:S.stageScores[1]||0,s1wrong:(S.stageWrongs[1]||[]).join(', '),
    s2score:S.stageScores[2]||0,s2wrong:(S.stageWrongs[2]||[]).join(', '),
    s3score:S.stageScores[3]||0,s3wrong:(S.stageWrongs[3]||[]).join(', '),
    s4score:S.stageScores[4]||0,s4wrong:(S.stageWrongs[4]||[]).join(', '),
  })}).catch(()=>{});
}
function calcScore(){
  const words=S.isRetry?S.retryWords:S.currentWords;
  const sid=S.stages[S.stageIdx];
  let c=0;
  words.forEach((w,i)=>{
    const ans=(S.answers[i]||'').trim().toLowerCase();
    if(sid===1&&ans===w.ko)c++;
    else if((sid===2||sid===3||sid===4)&&ans===w.en.toLowerCase())c++;
  });
  return c;
}
function nextStage(){
  clearInterval(S.timer);
  // 마지막 문제 답 안 하고 넘어가면 오답 처리
  const words=S.isRetry?S.retryWords:S.currentWords;
  if(!S.feedback[S.qIdx]){
    const sid=S.stages[S.stageIdx];
    const w=words[S.qIdx];
    S.answers[S.qIdx]='';S.feedback[S.qIdx]='wrong';
    if(!S.stageWrongs[sid])S.stageWrongs[sid]=[];
    S.stageWrongs[sid].push(w.en);
    if(!S.wrongWordObjs.find(x=>x.en===w.en))S.wrongWordObjs.push(w);
  }
  const score=calcScore();
  const sid=S.stages[S.stageIdx];
  S.stageScores[sid]=score;
  if(S.stageIdx<S.stages.length-1){
    S.stageIdx++;S.qIdx=0;S.answers={};S.feedback={};S.optionsCache={};S._ts=false;S._selectedOpt=undefined;render();
  } else {
    if(!S.isRetry)saveResult();
    S.screen='result';render();
  }
}
function startRetry(){
  if(S.wrongWordObjs.length===0)return;
  const shuffled=shuffle([...S.wrongWordObjs]);
  const sc={};shuffled.forEach((w,i)=>{sc[i]=scramble(w.en);});
  Object.assign(S,{screen:'quiz',isRetry:true,retryWords:shuffled,stages:[1,2],stageIdx:0,qIdx:0,
    answers:{},feedback:{},scrambles:sc,optionsCache:{},stageScores:{},stageWrongs:{},wrongWordObjs:[],_ts:false});
  clearInterval(S.timer);render();
}
function doLogin(){
  const id=document.getElementById('lid').value.trim();
  const pw=document.getElementById('lpw').value.trim();
  if(!id||!pw){S.loginError='아이디와 비밀번호를 입력해주세요';render();return;}
  S.loginError='로그인 중...';render();
  fetch(SCRIPT_URL+'?action=login&id='+encodeURIComponent(id)+'&pw='+encodeURIComponent(pw))
    .then(r=>r.json()).then(data=>{
      if(data.result==='success'){
        S.userId=id;S.name=data.name;S.division=data.division||'';S.school=data.school||'';
        S.loginError='';S.screen='divisionSelect';render();
      } else if(data.result==='pending'){
        S.loginError='선생님 승인 대기 중이에요!';render();
      } else {S.loginError='아이디 또는 비밀번호가 틀렸어요';render();}
    }).catch(()=>{S.loginError='연결 오류가 발생했어요';render();});
}
function doRegister(){
  const id=document.getElementById('rid').value.trim();
  const name=document.getElementById('rname').value.trim();
  const pw=document.getElementById('rpw').value.trim();
  const pw2=document.getElementById('rpw2').value.trim();
  const div=document.getElementById('rdiv').value;
  const school=document.getElementById('rschool')?document.getElementById('rschool').value:'';
  if(!id||!name||!pw||!pw2||!div){S.loginError='모든 항목을 입력해주세요';render();return;}
  if(pw!==pw2){S.loginError='비밀번호가 일치하지 않아요';render();return;}
  S.loginError='가입 신청 중...';render();
  fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',body:JSON.stringify({action:'register',id,name,password:pw,division:div,school})})
    .then(()=>{S.loginTab='done';render();}).catch(()=>{S.loginError='연결 오류가 발생했어요';render();});
}
function doTeacherLogin(){
  const id=document.getElementById('tid').value.trim();
  const pw=document.getElementById('tpw').value.trim();
  if(id===TEACHER_ID&&pw===TEACHER_PW){S.screen='teacher';S.loginError='';loadTeacherResults();}
  else{S.loginError='아이디 또는 비밀번호가 틀렸어요';render();}
}
function loadTeacherResults(){
  S.loading=true;S.screen='loading';render();
  Promise.all([
    fetch(SCRIPT_URL+'?action=getResults&division=중등부').then(r=>r.json()),
    fetch(SCRIPT_URL+'?action=getResults&division=고등부').then(r=>r.json()),
    fetch(SCRIPT_URL+'?action=getStudents').then(r=>r.json())
  ]).then(arr=>{
    S.teacherResults=[...arr[0].map(r=>{r.div='중등';return r;}),...arr[1].map(r=>{r.div='고등';return r;})];
    S.pendingStudents=arr[2].filter(s=>s.approved!=='Y');
    S.loading=false;S.screen='teacher';render();
  }).catch(()=>{S.loading=false;S.screen='teacher';render();});
}
function approveStudent(id){
  fetch(SCRIPT_URL+'?action=approve&id='+encodeURIComponent(id))
    .then(()=>{S.pendingStudents=S.pendingStudents.filter(s=>s.id!==id);render();})
    .catch(()=>alert('승인 중 오류가 발생했어요'));
}
function loadBooks(){
  S.loading=true;S.screen='loading';render();
  const params=S.division==='고등부'?'?action=getBooks&division=고등부&school='+encodeURIComponent(S.school):'?action=getBooks&division=중등부';
  Promise.all([
    fetch(SCRIPT_URL+params).then(r=>r.json()),
    fetch(SCRIPT_URL+'?action=getRankings&division='+encodeURIComponent(S.division)).then(r=>r.json())
  ]).then(arr=>{
    S.books=arr[0];S.rankings=arr[1];S.loading=false;S.screen='bookSelect';render();
  }).catch(()=>{S.loading=false;S.screen='bookSelect';render();});
}
function loadWords(book){
  S.loading=true;S.screen='loading';render();
  fetch(SCRIPT_URL+'?action=getWords&book='+encodeURIComponent(book))
    .then(r=>r.json()).then(data=>{
      S.allWords=data;
      const unitSet={};data.forEach(w=>{if(!unitSet[w.unit])unitSet[w.unit]=true;});
      S.units=Object.keys(unitSet);
      S.selectedBook=book;S.loading=false;S.screen='unitSelect';render();
    }).catch(()=>{S.loading=false;render();});
}
function doStart(){
  const words=shuffle(S.allWords.filter(w=>w.unit===S.selectedUnit));
  const sc={};words.forEach((w,i)=>{sc[i]=scramble(w.en);});
  const stages=[1,2];
  if(S.opt3)stages.push(3);
  if(S.opt4)stages.push(4);
  Object.assign(S,{screen:'quiz',isRetry:false,retryWords:[],currentWords:words,stages,stageIdx:0,qIdx:0,
    answers:{},feedback:{},scrambles:sc,optionsCache:{},stageScores:{},stageWrongs:{},wrongWordObjs:[],_ts:false});
  clearInterval(S.timer);render();
}
function copyResult(score,total,pct,wrongEncoded){
  const wrong=decodeURIComponent(wrongEncoded);
  const text='[단어시험 결과]\n'+S.name+' '+S.selectedUnit+'\n점수: '+score+'/'+total+' (정확도 '+pct+'%)\n틀린단어: '+(wrong||'없음');
  navigator.clipboard.writeText(text).then(()=>alert('복사됐어요! 카카오톡에 붙여넣기 하세요 😊')).catch(()=>prompt('아래 텍스트를 복사하세요:',text));
}
function copyTeacherResult(txt){
  navigator.clipboard.writeText(txt).then(()=>alert('복사됐어요! 카카오톡에 붙여넣기 하세요 😊')).catch(()=>prompt('아래 텍스트를 복사하세요:',txt));
}
function loadRankings(){
  S.loading=true;render();
  Promise.all([
    fetch(SCRIPT_URL+'?action=getRankings&division='+encodeURIComponent(S.division||'중등부')).then(r=>r.json()),
    fetch(SCRIPT_URL+'?action=getResults&division='+encodeURIComponent(S.division||'중등부')).then(r=>r.json())
  ]).then(arr=>{
    S.rankings=arr[0];
    S.myResults=arr[1].filter(r=>r.id===S.userId);
    S.loading=false;render();
  }).catch(()=>{S.loading=false;render();});
}

function render(){
  const root=document.getElementById('root');
  if(S.screen==='loading'){root.innerHTML='<div class="loading" style="padding:4rem;">불러오는 중...</div>';return;}

  if(S.screen==='login'){
    if(S.loginTab==='done'){
      root.innerHTML='<div class="app-header"><div class="app-title">Voca Test</div><div class="app-sub">단계별 단어 학습 시스템</div></div><div class="card" style="text-align:center;padding:2rem;"><div style="font-size:17px;font-weight:500;margin-bottom:8px;">가입 신청 완료!</div><div style="font-size:15px;color:#888;">선생님 승인 후 로그인할 수 있어요</div></div><button class="btn primary" onclick="S.loginTab=\'login\';render()">로그인으로 돌아가기</button>';
      return;
    }
    if(S.loginTab==='teacher'){

        if(Number(r.s3score)>0||s3w.length>0)html+='<div class="sresrow"><span style="color:#888">Stage 3</span><span style="color:'+(s3w.length>0?'#A32D2D':'#3B6D11')+'">'+(s3w.length>0?'오답 '+s3w.length+'개: '+s3w.join(', '):'100점')+'</span></div>';
        if(Number(r.s4score)>0||s4w.length>0)html+='<div class="sresrow"><span style="color:#888">Stage 4</span><span style="color:'+(s4w.length>0?'#A32D2D':'#3B6D11')+'">'+(s4w.length>0?'오답 '+s4w.length+'개: '+s4w.join(', '):'100점')+'</span></div>';
        html+='</div>';
      });
      html+='<button class="btn green" onclick="copyTeacherResult(\''+txt.replace(/\n/g,'\\n').replace(/'/g,"\\'")+'\')">카카오톡 복사</button>';
      html+='<button class="btn secondary" style="margin-top:8px;" onclick="S.teacherSelected=null;render()">뒤로</button>';
      root.innerHTML=html;return;
    }

    const filtered=S.teacherResults.filter(r=>String(r.date).startsWith(todayPrefix)||String(r.date).startsWith(yesterdayPrefix));
    const byStudent={};
    filtered.forEach(r=>{
      const key=r.id+'_'+(String(r.date).startsWith(today)?'today':'yesterday');
      if(!byStudent[key])byStudent[key]={name:r.name,id:r.id,div:r.div,date:r.date,isToday:String(r.date).startsWith(todayPrefix),units:[]};
      byStudent[key].units.push(r);
    });
    const students=Object.values(byStudent).sort((a,b)=>String(b.date).localeCompare(String(a.date)));

    let html='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;"><div class="title" style="margin-bottom:0;">선생님 화면</div><button style="font-size:15px;color:#888;background:none;border:none;cursor:pointer;" onclick="loadTeacherResults()">새로고침</button></div>';
    html+='<div style="font-size:14px;color:#888;margin-bottom:12px;">어제 · 오늘 결과</div>';

    if(S.pendingStudents&&S.pendingStudents.length>0){
      html+='<div class="card" style="border-color:#BA7517;margin-bottom:12px;"><div style="font-size:16px;font-weight:500;color:#633806;margin-bottom:10px;">승인 대기 ('+S.pendingStudents.length+'명)</div>';
      S.pendingStudents.forEach(s=>{
        html+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #eee;"><div><div style="font-size:16px;font-weight:500;">'+s.name+'</div><div style="font-size:14px;color:#888;">'+s.id+' · '+(s.division||'')+''+'</div></div><button class="btn green" style="width:auto;padding:6px 14px;margin:0;font-size:15px;" data-apid="'+s.id+'">승인</button></div>';
      });
      html+='</div>';
    }

    if(students.length===0)html+='<div style="text-align:center;padding:2rem;color:#888;">결과가 없어요</div>';
    students.forEach((st,si)=>{
      const totalScore=st.units.reduce((sum,r)=>sum+(Number(r.s1score)||0)+(Number(r.s2score)||0)+(Number(r.s3score)||0)+(Number(r.s4score)||0),0);
      const cls=totalScore>=32?'score-hi':totalScore>=20?'score-mid':'score-lo';
      const unitNames=st.units.map(r=>r.unit).join(', ');
      const notice='\n\n틀린 단어는 예문쓰기 숙제 있습니다.';
      const txtLines=st.units.map(r=>{
        const s1w=mw(r.s1wrong),s2w=mw(r.s2wrong),s3w=mw(r.s3wrong),s4w=mw(r.s4wrong);
        let line='유닛: '+r.unit;
        line+='\nStage 1: '+(s1w.length>0?'오답 '+s1w.length+'개 ('+s1w.join(', ')+')':'오답 없음');
        line+='\nStage 2: '+(s2w.length>0?'오답 '+s2w.length+'개 ('+s2w.join(', ')+')':'오답 없음');
        if(s3w.length>0)line+='\nStage 3: 오답 '+s3w.length+'개 ('+s3w.join(', ')+')';
        if(s4w.length>0)line+='\nStage 4: 오답 '+s4w.length+'개 ('+s4w.join(', ')+')';
        return line;
      }).join('\n\n');
      const txt='[단어시험 결과]\n이름: '+st.name+'\n날짜: '+st.date+'\n\n'+txtLines+notice;
      html+='<div class="card">';
      html+='<div style="display:flex;justify-content:space-between;align-items:center;">';
      html+='<div><span style="font-size:17px;font-weight:500;">'+st.name+'</span>';
      html+='<span style="font-size:13px;color:#fff;background:'+(st.isToday?'#1D9E75':'#888')+';border-radius:999px;padding:2px 8px;margin-left:6px;">'+(st.isToday?'오늘':'어제')+'</span>';
      html+='<span style="font-size:13px;color:#888;margin-left:4px;">'+st.div+'</span></div>';
      html+='<div style="display:flex;align-items:center;gap:8px;">';
      html+='<span class="score-pill '+cls+'">'+totalScore+'점</span>';
      html+='<button class="btn green" style="width:auto;padding:6px 12px;margin:0;font-size:13px;" data-si="'+si+'">카톡복사</button>';
      html+='</div></div>';
      html+='<div style="font-size:13px;color:#888;margin-top:6px;">'+unitNames+'</div>';
      html+='</div>';
    });
    html+='<button class="btn secondary" style="margin-top:8px;" onclick="S.screen=\'login\';S.loginTab=\'login\';render()">로그아웃</button>';
    root.innerHTML=html;
    document.querySelectorAll('[data-apid]').forEach(btn=>{
      btn.addEventListener('click',()=>approveStudent(btn.getAttribute('data-apid')));
    });
    document.querySelectorAll('[data-si]').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const st=students[parseInt(btn.getAttribute('data-si'))];
        const allWrongCount=st.units.reduce((sum,r)=>sum+mw(r.s1wrong).length+mw(r.s2wrong).length+mw(r.s3wrong).length+mw(r.s4wrong).length,0);
        const notice=allWrongCount>0?'\n\n틀린 단어는 예문쓰기 숙제 있습니다.':'';
        const txtLines=st.units.map(r=>{
          const s1w=mw(r.s1wrong),s2w=mw(r.s2wrong),s3w=mw(r.s3wrong),s4w=mw(r.s4wrong);
          let line='유닛: '+r.unit;
          line+='\nStage 1: '+(s1w.length>0?'오답 '+s1w.length+'개 ('+s1w.join(', ')+')':'오답 없음');
          line+='\nStage 2: '+(s2w.length>0?'오답 '+s2w.length+'개 ('+s2w.join(', ')+')':'오답 없음');
          if(s3w.length>0)line+='\nStage 3: 오답 '+s3w.length+'개 ('+s3w.join(', ')+')';
          if(s4w.length>0)line+='\nStage 4: 오답 '+s4w.length+'개 ('+s4w.join(', ')+')';
          return line;
        }).join('\n\n');
        const txt='[단어시험 결과]\n이름: '+st.name+'\n날짜: '+st.date+'\n\n'+txtLines+notice;
        copyTeacherResult(txt);
      });
    });
    return;
  }

  if(S.screen!=='quiz')return;

  const words=S.isRetry?S.retryWords:S.currentWords;
  const sid=S.stages[S.stageIdx];
  const sdef=STAGE_DEFS.find(s=>s.id===sid);
  if(!sdef||!words||words.length===0){root.innerHTML='<div class="loading">불러오는 중...</div>';return;}
  const w=words[S.qIdx];
  const total=words.length;
  const pct=Math.round((S.qIdx/total)*100);
  const fb=S.feedback[S.qIdx];
  const isLast=S.qIdx===total-1;
  const isMC=sdef.mc;
  const maxSec=isMC?10:40;
  if(!fb&&!S._ts){S._ts=true;setTimeout(()=>startTimer(maxSec),100);}

  let qHTML='';
  if(sid===1){
    const cacheKey=S.stageIdx+'_'+S.qIdx+'_1';
    if(!S.optionsCache[cacheKey])S.optionsCache[cacheKey]=shuffle([w.ko,...getWrong(words,w,'ko')]);
    const opts=S.optionsCache[cacheKey];
    qHTML='<div class="card"><div class="label">영어 단어</div><div class="qword">'+w.en+'</div></div><div class="opts" id="opts-wrap">';
    opts.forEach((opt,oi)=>{
      const isSelected=S._selectedOpt===oi;
      const cls=fb?(opt===w.ko?'ok':(S.answers[S.qIdx]===opt?'no':'')):(isSelected?'selected':'');
      qHTML+='<button class="opt '+cls+'" data-oi="'+oi+'" '+(fb?'disabled':'')+'>'+opt+'</button>';
    });
    qHTML+='</div>';
    if(!fb&&S._selectedOpt!==undefined)qHTML+='<button class="sbtn" id="mc-confirm">확인</button>';
    if(fb&&fb==='wrong')qHTML+='<div class="fb ok" style="margin-top:8px;">정답: '+w.ko+'</div>';
  } else if(sid===2){
    const cacheKey=S.stageIdx+'_'+S.qIdx+'_2';
    if(!S.optionsCache[cacheKey])S.optionsCache[cacheKey]=shuffle([w.en,...getWrong(words,w,'en')]);
    const opts=S.optionsCache[cacheKey];
    qHTML='<div class="card"><div class="label">한국어 뜻</div><div class="qword sm">'+w.ko+'</div></div><div class="opts" id="opts-wrap">';
    opts.forEach((opt,oi)=>{
      const isSelected=S._selectedOpt===oi;
      const cls=fb?(opt===w.en?'ok':(S.answers[S.qIdx]===opt?'no':'')):(isSelected?'selected':'');
      qHTML+='<button class="opt '+cls+'" data-oi="'+oi+'" '+(fb?'disabled':'')+'>'+opt+'</button>';
    });
    qHTML+='</div>';
    if(!fb&&S._selectedOpt!==undefined)qHTML+='<button class="sbtn" id="mc-confirm">확인</button>';
    if(fb&&fb==='wrong')qHTML+='<div class="fb ok" style="margin-top:8px;">정답: '+w.en+'</div>';
  } else if(sid===3){
    qHTML='<div class="card"><div class="label">한국어 뜻</div><div class="qword sm">'+w.ko+'</div></div><input type="text" id="ti" placeholder="영어 단어 입력..." value="'+(S.answers[S.qIdx]||'')+'" onkeydown="if(event.key===\'Enter\')subType('+S.qIdx+',\''+w.en+'\')" '+(fb?'disabled':'')+'>'+(!fb?'<button class="sbtn" onclick="subType('+S.qIdx+',\''+w.en+'\')">확인</button>':'')+(fb?'<div class="fb '+(fb==='correct'?'ok':'no')+'">'+(fb==='correct'?'정답!':'오답 — 정답: '+w.en)+'</div>':'');
  } else {
    qHTML='<div class="card"><div class="label">한국어 뜻</div><div class="qword sm">'+w.ko+'</div><div style="font-size:14px;color:#888;margin-top:10px;">섞인 철자</div><div class="scramble">'+S.scrambles[S.qIdx]+'</div></div><input type="text" id="ti" placeholder="철자를 맞춰 입력..." value="'+(S.answers[S.qIdx]||'')+'" onkeydown="if(event.key===\'Enter\')subType('+S.qIdx+',\''+w.en+'\')" '+(fb?'disabled':'')+'>'+(!fb?'<button class="sbtn" onclick="subType('+S.qIdx+',\''+w.en+'\')">확인</button>':'')+(fb?'<div class="fb '+(fb==='correct'?'ok':'no')+'">'+(fb==='correct'?'정답!':'오답 — 정답: '+w.en)+'</div>':'');
  }

  let html='';
  if(S.isRetry)html+='<div class="retry-banner"><p>오답 단어 재시험 ('+total+'개)</p></div>';
  html+='<div class="badge">'+S.selectedUnit+' · Stage '+sid+' · '+(S.stageIdx+1)+'/'+S.stages.length+'</div>';
  html+='<div class="title">'+sdef.desc+'</div>';
  html+='<div class="pbar"><div class="pfill" style="width:'+pct+'%"></div></div>';
  html+='<div style="margin:8px 0 4px;"><div class="ttext"><span id="ttime">'+maxSec+'초</span> · '+(isMC?'객관식':'주관식')+'</div><div class="tbar"><div class="tfill" id="tfill" style="width:100%;background:#1D9E75"></div></div></div>';
  html+=qHTML;
  html+='<div class="nav"><span></span><span style="font-size:15px;color:#888;">'+(S.qIdx+1)+' / '+total+'</span>'+(isLast?'<button class="nbtn" onclick="nextStage()">'+(S.stageIdx<S.stages.length-1?'다음 단계':'결과 보기')+'</button>':'<button class="nbtn" onclick="nextQ()">다음</button>')+'</div>';
  root.innerHTML=html;
  const ti=document.getElementById('ti');if(ti&&!fb)ti.focus();
  const optsWrap=document.getElementById('opts-wrap');
  if(optsWrap&&!fb){
    const curSid=S.stages[S.stageIdx];
    const curWords=S.isRetry?S.retryWords:S.currentWords;
    const curW=curWords[S.qIdx];
    const curIdx=S.qIdx;
    const curOpts=S.optionsCache[S.stageIdx+'_'+S.qIdx+'_'+curSid];
    optsWrap.querySelectorAll('.opt').forEach(btn=>{
      btn.addEventListener('click',()=>{
        S._selectedOpt=parseInt(btn.getAttribute('data-oi'));
        render();
      });
    });
    const confirmBtn=document.getElementById('mc-confirm');
    if(confirmBtn){
      confirmBtn.addEventListener('click',()=>{
        if(S._selectedOpt===undefined)return;
        const chosen=curOpts[S._selectedOpt];
        const correct=curSid===1?curW.ko:curW.en;
        S._selectedOpt=undefined;
        selMC(curIdx,chosen,correct);
      });
    }
  }
}

function selMC(idx,ans,correct){
  if(S.feedback[idx])return;
  clearInterval(S.timer);
  S.answers[idx]=ans;
  const isOk=ans===correct;
  S.feedback[idx]=isOk?'correct':'wrong';
  if(!isOk){
    const sid=S.stages[S.stageIdx];
    if(!S.stageWrongs[sid])S.stageWrongs[sid]=[];
    const words=S.isRetry?S.retryWords:S.currentWords;
    const w=words[idx];
    S.stageWrongs[sid].push(w.en);
    if(!S.wrongWordObjs.find(x=>x.en===w.en))S.wrongWordObjs.push(w);
  }
  S._ts=false;render();
}
function subType(idx,correct){
  const ti=document.getElementById('ti');if(!ti)return;
  clearInterval(S.timer);
  const val=ti.value.trim().toLowerCase();
  S.answers[idx]=val;
  const isOk=checkAnswer(val,correct);
  S.feedback[idx]=isOk?'correct':'wrong';
  if(!isOk){
    const sid=S.stages[S.stageIdx];
    if(!S.stageWrongs[sid])S.stageWrongs[sid]=[];
    const words=S.isRetry?S.retryWords:S.currentWords;
    const w=words[idx];
    S.stageWrongs[sid].push(w.en);
    if(!S.wrongWordObjs.find(x=>x.en===w.en))S.wrongWordObjs.push(w);
  }
  S._ts=false;render();
}
function nextQ(){
  S._selectedOpt=undefined;
  const words=S.isRetry?S.retryWords:S.currentWords;
  if(S.qIdx<words.length-1){
    // 답 안 하고 넘어가면 오답 처리
    if(!S.feedback[S.qIdx]){
      const sid=S.stages[S.stageIdx];
      const w=words[S.qIdx];
      S.answers[S.qIdx]='';S.feedback[S.qIdx]='wrong';
      if(!S.stageWrongs[sid])S.stageWrongs[sid]=[];
      S.stageWrongs[sid].push(w.en);
      if(!S.wrongWordObjs.find(x=>x.en===w.en))S.wrongWordObjs.push(w);
    }
    clearInterval(S.timer);S._ts=false;S.qIdx++;render();
  }
}
function prevQ(){if(S.qIdx>0){clearInterval(S.timer);S._ts=false;S.qIdx--;render();}}

render();
</script>
</body>
</html>
